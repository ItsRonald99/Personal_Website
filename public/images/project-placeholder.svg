<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <rect width="400" height="220" fill="#E8E4DC"/>
  <!-- Pixel art mountain island scene -->
  <!-- Sky -->
  <rect x="0" y="0" width="400" height="140" fill="#B8D4F0"/>
  <!-- Clouds pixel style -->
  <rect x="40" y="20" width="8" height="8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="48" y="16" width="16" height="8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="64" y="20" width="8" height="8" fill="#FFFFFF" opacity="0.9"/>
  <rect x="44" y="24" width="24" height="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="280" y="30" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="288" y="26" width="20" height="8" fill="#FFFFFF" opacity="0.8"/>
  <rect x="308" y="30" width="8" height="8" fill="#FFFFFF" opacity="0.8"/>
  <!-- Water -->
  <rect x="0" y="140" width="400" height="80" fill="#6AABE0"/>
  <rect x="0" y="152" width="400" height="4" fill="#7BBDE8" opacity="0.5"/>
  <rect x="0" y="162" width="400" height="3" fill="#7BBDE8" opacity="0.4"/>
  <!-- Island/Mountain - pixel style -->
  <rect x="168" y="100" width="8" height="8" fill="#8B6F4E"/>
  <rect x="160" y="108" width="24" height="8" fill="#8B6F4E"/>
  <rect x="152" y="116" width="40" height="8" fill="#7A6040"/>
  <rect x="144" y="124" width="56" height="8" fill="#6B5230"/>
  <rect x="136" y="132" width="72" height="12" fill="#5C4425"/>
  <!-- Green top -->
  <rect x="164" y="92" width="16" height="8" fill="#4CAF50"/>
  <rect x="160" y="100" width="24" height="8" fill="#388E3C"/>
  <!-- Trees on island -->
  <rect x="148" y="118" width="4" height="4" fill="#2E7D32"/>
  <rect x="148" y="114" width="8" height="4" fill="#388E3C"/>
  <rect x="188" y="118" width="4" height="4" fill="#2E7D32"/>
  <rect x="184" y="114" width="8" height="4" fill="#388E3C"/>
  <!-- Reflection -->
  <rect x="168" y="144" width="8" height="4" fill="#5B8DB8" opacity="0.4"/>
  <rect x="160" y="148" width="24" height="3" fill="#5B8DB8" opacity="0.3"/>
</svg>
